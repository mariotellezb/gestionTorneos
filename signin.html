<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Gestión de Torneos</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">

<!-- Navbar -->
<nav class="navbar-auth">
    <a href="index.html" class="navbar-auth-logo">
        <img src="img/tl_letters.png" alt="TROYAN LEGACY" class="logo-auth-img">
    </a>
</nav>

<div id="alert" class="alert"></div>

<div class="container">
    <h2>Crear Cuenta</h2>

    <form id="signupForm">
        <div class="form-group">
            <input type="text" id="name" placeholder="Nombre completo" required>
        </div>
        <div class="form-group">
            <input type="email" id="email" placeholder="Correo institucional" required>
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Contraseña" required>
        </div>

        <button type="submit">Registrarse</button>
    </form>

    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="footer-content">
        <a href="#" class="footer-link">Términos y Condiciones</a>
        <span class="footer-separator">|</span>
        <a href="#" class="footer-link">Privacidad</a>
        <span class="footer-separator">|</span>
        <span class="footer-text">Copyright</span>
        <span class="footer-separator">|</span>
        <a href="index.html" class="footer-link">Troyan Legacy</a>
    </div>
</footer>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
